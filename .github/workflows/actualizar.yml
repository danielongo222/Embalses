name: Actualizar datos embalses

on:
  schedule:
    - cron: "0 10 * * 2"  # cada martes a las 10:00
  workflow_dispatch:       # también lanzable manualmente

jobs:
  actualizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Ejecutar script de datos
        run: python procesar.py

      - name: Subir datos.json actualizado
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add datos.json
          git diff --cached --quiet || git commit -m "Datos embalses $(date +'%Y-%m-%d')"
          git push
