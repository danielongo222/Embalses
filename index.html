      </div>
    );

      const p = pct(v, c);
      const col = accent || color(p);
      return (
        <div style={{ background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 14, padding: "16px 18px", flex: 1, minWidth: 120 }}>

          <p style={{ margin: "0 0 3px", fontSize: 24, fontWeight: 700, color: col, letterSpacing: "-.02em" }}>{p}%</p>
          <p style={{ margin: "0 0 6px", fontSize: 12, color: "rgba(255,255,255,0.4)" }}>{fmt(v)} / {fmt(c)}</p>
          {sub && <p style={{ margin: 0, fontSize: 11, color: "rgba(255,255,255,0.28)" }}>{sub}</p>}
        </div>
      );
    };

      const d = a - r;
      const p = Math.round((d / r) * 100);
      return (
        <span style={{ display: "flex", alignItems: "center", gap: 5 }}>
          <span style={{ fontSize: 11, color: "rgba(255,255,255,0.35)" }}>{label}</span>
          <span style={{ fontSize: 12, fontWeight: 600, color: d >= 0 ? "#4ade80" : "#f87171" }}>{d >= 0 ? "▲" : "▼"} {Math.abs(p)}%</span>

      );
    };

          <span style={{ fontSize: 12, color: "rgba(255,255,255,0.3)" }}>media 10a: {pct(item.media10, item.capacidad)}%</span>

      const p = pct(item.hm3, item.capacidad);
      const emb = EMBALSES.filter(e => {
        if (tipo === "cuenca") return e.cuenca === item.nombre;
        if (tipo === "ccaa") return e.ccaa === item.nombre;
        if (tipo === "provincia") return norm(e.provincia) === norm(item.nombre);
        return false;
      });
      return (

          <p style={{ margin: "0 0 4px", fontSize: 11, color: "rgba(255,255,255,0.3)", letterSpacing: ".1em", textTransform: "uppercase" }}>{tipo === "cuenca" ? "Cuenca" : tipo === "ccaa" ? "Comunidad autónoma" : "Provincia"}</p>

          <p style={{ margin: "0 0 10px", fontSize: 52, fontWeight: 800, letterSpacing: "-.04em", color: color(p) }}>{p}%</p>
          <Bar v={item.hm3} c={item.capacidad} h={8} />
          <div style={{ display: "flex", gap: 10, marginTop: 18, flexWrap: "wrap" }}>

            <KPI label="Hace 1 año" v={item.hace1year} c={item.capacidad} accent="rgba(255,255,255,0.5)" sub={`Δ ${item.hm3 > item.hace1year ? "+" : ""}${Math.round(item.hm3 - item.hace1year)} hm³`} />
            <KPI label="Media 10 años" v={item.media10} c={item.capacidad} accent="rgba(255,255,255,0.35)" sub={`Δ ${item.hm3 > item.media10 ? "+" : ""}${Math.round(item.hm3 - item.media10)} hm³`} />

          <div style={{ display: "flex", gap: 16, marginTop: 12, flexWrap: "wrap" }}>

            <Delta a={item.hm3} r={item.media10} label="vs media 10 años" />
          </div>
          {emb.length > 0 && (
            <>
              <p style={{ margin: "24px 0 10px", fontSize: 12, color: "rgba(255,255,255,0.3)" }}>Embalses ({emb.length})</p>
              {emb.map(e => <Item key={e.id} nombre={e.nombre} sub={tipo !== "provincia" ? e.provincia : e.cuenca} hm3={e.hm3} capacidad={e.capacidad} onClick={() => onEmbalse(e.id)} />)}
            </>
          )}
        </div>
      );
    };

    function App() {
      const [vista, setVista] = useState("nacional");
      const [sel, setSel] = useState(null);
      const [q, setQ] = useState("");

      const go = (v) => { setVista(v); setSel(null); setQ(""); };

      const termino = norm(q.trim());
      const resultados = termino.length < 2 ? [] : EMBALSES.filter(e =>
        norm(e.nombre).includes(termino) ||
        norm(e.provincia).includes(termino) ||
        norm(e.cuenca).includes(termino) ||
        norm(e.ccaa).includes(termino)
      );

      const navs = [
        { id: "nacional", label: "España" },
        { id: "cuencas", label: "Cuencas" },
        { id: "ccaa", label: "CC.AA." },
        { id: "provincias", label: "Provincias" },
        { id: "embalses", label: "Embalses" },
      ];

      const embalseActual = vista === "embalses" && sel ? EMBALSES.find(e => e.id === sel) : null;

      return (
        <div style={{ minHeight: "100vh", background: "#0a0a0f", color: "#fff" }}>
          <div style={{ borderBottom: "1px solid rgba(255,255,255,0.06)", padding: "0 20px", position: "sticky", top: 0, background: "#0a0a0f", zIndex: 10 }}>
            <div style={{ maxWidth: 860, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between", height: 52 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <div style={{ width: 7, height: 7, borderRadius: "50%", background: "#3b82f6" }} />
                <span style={{ fontSize: 15, fontWeight: 600 }}>embalses<span style={{ color: "rgba(255,255,255,0.3)" }}>.es</span></span>
              </div>
              <nav style={{ display: "flex", gap: 2 }}>
                {navs.map(({ id, label }) => (
                  <button key={id} onClick={() => go(id)} style={{ background: vista === id ? "rgba(255,255,255,0.09)" : "none", border: "none", color: vista === id ? "#fff" : "rgba(255,255,255,0.4)", fontSize: 13, cursor: "pointer", padding: "7px 12px", borderRadius: 99 }}>{label}</button>
                ))}
              </nav>
            </div>
          </div>

          <div style={{ maxWidth: 860, margin: "0 auto", padding: "28px 20px 60px" }}>

            {/* NACIONAL */}
            {vista === "nacional" && (() => {
              const p = pct(TOTAL.hm3, TOTAL.capacidad);
              return (
                <div>
                  <p style={{ margin: "0 0 4px", fontSize: 11, color: "rgba(255,255,255,0.3)", letterSpacing: ".1em", textTransform: "uppercase" }}>Reserva total · España</p>
                  <p style={{ margin: "0 0 8px", fontSize: 64, fontWeight: 800, letterSpacing: "-.05em", lineHeight: 1, color: color(p) }}>{p}<span style={{ fontSize: 30, fontWeight: 400, color: "rgba(255,255,255,0.3)" }}>%</span></p>
                  <p style={{ margin: "0 0 14px", fontSize: 15, color: "rgba(255,255,255,0.4)" }}>{fmt(TOTAL.hm3)} de {fmt(TOTAL.capacidad)} de capacidad total</p>
                  <Bar v={TOTAL.hm3} c={TOTAL.capacidad} h={8} />
                  <div style={{ display: "flex", gap: 10, marginTop: 18, flexWrap: "wrap" }}>
                    <KPI label="Hoy" v={TOTAL.hm3} c={TOTAL.capacidad} sub="Actualizado esta semana" />
                    <KPI label="Hace 1 año" v={TOTAL.hace1year} c={TOTAL.capacidad} accent="rgba(255,255,255,0.5)" sub={`Δ ${TOTAL.hm3 > TOTAL.hace1year ? "+" : ""}${Math.round(TOTAL.hm3 - TOTAL.hace1year)} hm³`} />
                    <KPI label="Media 10 años" v={TOTAL.media10} c={TOTAL.capacidad} accent="rgba(255,255,255,0.35)" sub={`Δ ${TOTAL.hm3 > TOTAL.media10 ? "+" : ""}${Math.round(TOTAL.hm3 - TOTAL.media10)} hm³`} />
                  </div>
                  <div style={{ display: "flex", gap: 16, marginTop: 12, marginBottom: 28, flexWrap: "wrap" }}>
                    <Delta a={TOTAL.hm3} r={TOTAL.hace1year} label="vs año anterior" />
                    <Delta a={TOTAL.hm3} r={TOTAL.media10} label="vs media 10 años" />
                  </div>
                  <p style={{ margin: "0 0 12px", fontSize: 11, color: "rgba(255,255,255,0.3)", letterSpacing: ".08em", textTransform: "uppercase" }}>Por cuenca</p>
                  {[...CUENCAS].sort((a, b) => pct(b.hm3, b.capacidad) - pct(a.hm3, a.capacidad)).map(c => (
                    <Item key={c.id} nombre={c.nombre} hm3={c.hm3} capacidad={c.capacidad} onClick={() => { setVista("cuencas"); setSel(c.id); }} />
                  ))}
                </div>
              );
            })()}

            {/* CUENCAS */}
            {vista === "cuencas" && !sel && (
              <div>
                <p style={{ margin: "0 0 18px", fontSize: 22, fontWeight: 700, letterSpacing: "-.02em" }}>Cuencas hidrográficas</p>
                {[...CUENCAS].sort((a, b) => b.capacidad - a.capacidad).map(c => <ItemConMetricas key={c.id} item={c} onClick={() => setSel(c.id)} />)}
              </div>
            )}
            {vista === "cuencas" && sel && (() => {
              const c = CUENCAS.find(x => x.id === sel);
              return c ? <div><Volver onClick={() => setSel(null)} /><Detalle tipo="cuenca" item={c} onEmbalse={(id) => { setVista("embalses"); setSel(id); }} /></div> : null;
            })()}

            {/* CC.AA. */}
            {vista === "ccaa" && !sel && (
              <div>
                <p style={{ margin: "0 0 18px", fontSize: 22, fontWeight: 700, letterSpacing: "-.02em" }}>Comunidades autónomas</p>
                {[...CCAA].sort((a, b) => b.hm3 - a.hm3).map(c => <ItemConMetricas key={c.id} item={c} onClick={() => setSel(c.id)} />)}
              </div>
            )}
            {vista === "ccaa" && sel && (() => {
              const c = CCAA.find(x => x.id === sel);
              return c ? <div><Volver onClick={() => setSel(null)} /><Detalle tipo="ccaa" item={c} onEmbalse={(id) => { setVista("embalses"); setSel(id); }} /></div> : null;
            })()}

            {/* PROVINCIAS */}
            {vista === "provincias" && !sel && (
              <div>
                <p style={{ margin: "0 0 18px", fontSize: 22, fontWeight: 700, letterSpacing: "-.02em" }}>Provincias</p>
                {[...PROVINCIAS].sort((a, b) => b.hm3 - a.hm3).map(p => <ItemConMetricas key={p.id} item={p} onClick={() => setSel(p.id)} />)}
              </div>
            )}
            {vista === "provincias" && sel && (() => {
              const p = PROVINCIAS.find(x => x.id === sel);
              return p ? <div><Volver onClick={() => setSel(null)} /><Detalle tipo="provincia" item={p} onEmbalse={(id) => { setVista("embalses"); setSel(id); }} /></div> : null;
            })()}

            {/* EMBALSES */}
            {vista === "embalses" && !sel && (
              <div>
                <p style={{ margin: "0 0 14px", fontSize: 22, fontWeight: 700, letterSpacing: "-.02em" }}>Buscar embalse</p>
                <input
                  value={q}
                  onChange={e => setQ(e.target.value)}
                  placeholder="Nombre, provincia, cuenca o comunidad…"
                  style={{ width: "100%", background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.12)", borderRadius: 12, padding: "12px 16px", color: "#fff", fontSize: 15, marginBottom: 16 }}
                />
                {termino.length >= 2 && (
                  <p style={{ fontSize: 12, color: "rgba(255,255,255,0.3)", marginBottom: 10 }}>
                    {resultados.length === 0 ? `Sin resultados para "${q}"` : `${resultados.length} resultado${resultados.length !== 1 ? "s" : ""}`}
                  </p>
                )}
                {(termino.length < 2 ? [...EMBALSES].sort((a, b) => b.capacidad - a.capacidad) : resultados).map(e => (
                  <Item key={e.id} nombre={e.nombre} sub={`${e.provincia} · ${e.cuenca}`} hm3={e.hm3} capacidad={e.capacidad} onClick={() => setSel(e.id)} />
                ))}
              </div>
            )}
            {vista === "embalses" && sel && embalseActual && (() => {
              const e = embalseActual;
              const p = pct(e.hm3, e.capacidad);
              return (
                <div>
                  <Volver onClick={() => setSel(null)} />
                  <p style={{ margin: "0 0 2px", fontSize: 11, color: "rgba(255,255,255,0.3)", letterSpacing: ".1em", textTransform: "uppercase" }}>Embalse</p>
                  <p style={{ margin: "0 0 5px", fontSize: 26, fontWeight: 700 }}>{e.nombre}</p>
                  <p style={{ margin: "0 0 16px", fontSize: 13, color: "rgba(255,255,255,0.35)" }}>{e.provincia} · {e.cuenca} · {e.ccaa}</p>
                  <p style={{ margin: "0 0 10px", fontSize: 52, fontWeight: 800, letterSpacing: "-.04em", color: color(p) }}>{p}%</p>
                  <Bar v={e.hm3} c={e.capacidad} h={8} />
                  <div style={{ display: "flex", gap: 10, marginTop: 18, flexWrap: "wrap" }}>
                    <KPI label="Hoy" v={e.hm3} c={e.capacidad} />
                    <KPI label="Hace 1 año" v={e.hace1year} c={e.capacidad} accent="rgba(255,255,255,0.5)" sub={`Δ ${e.hm3 > e.hace1year ? "+" : ""}${Math.round(e.hm3 - e.hace1year)} hm³`} />
                    <KPI label="Media 10 años" v={e.media10} c={e.capacidad} accent="rgba(255,255,255,0.35)" sub={`Δ ${e.hm3 > e.media10 ? "+" : ""}${Math.round(e.hm3 - e.media10)} hm³`} />
                  </div>
                  <div style={{ display: "flex", gap: 16, marginTop: 12, flexWrap: "wrap" }}>
                    <Delta a={e.hm3} r={e.hace1year} label="vs año anterior" />
                    <Delta a={e.hm3} r={e.media10} label="vs media 10 años" />
                  </div>
                </div>
              );
            })()}

          </div>

          <div style={{ borderTop: "1px solid rgba(255,255,255,0.05)", padding: "16px 24px" }}>
            <p style={{ margin: 0, textAlign: "center", fontSize: 12, color: "rgba(255,255,255,0.2)" }}>
              Datos: <a href="https://www.embalses.net" target="_blank" rel="noopener noreferrer" style={{ color: "rgba(255,255,255,0.3)", textDecoration: "none" }}>embalses.net</a> · Ministerio de Transición Ecológica
            </p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
