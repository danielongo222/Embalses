<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Embalses España</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #0a0a0f; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
    input, button { font-family: inherit; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 99px; }
    ::placeholder { color: rgba(255,255,255,0.3); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    // ── helpers ─────────────────────────────────────────────────────────────
    const pct  = (v, c) => c > 0 ? Math.round((v / c) * 100) : 0;
    const fmt  = (v) => v >= 1000 ? `${(v / 1000).toFixed(2)} km³` : `${Math.round(v)} hm³`;
    const col  = (p) => p >= 75 ? "#4ade80" : p >= 50 ? "#facc15" : p >= 30 ? "#fb923c" : "#f87171";
    const norm = (s) => s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");

    const T = { muted: "rgba(255,255,255,0.7)", faint: "rgba(255,255,255,0.5)", label: "rgba(255,255,255,0.45)" };
    const rowStyle = { background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.07)", borderRadius: 12, padding: "13px 16px", cursor: "pointer", marginBottom: 8 };

    // ── componentes base ─────────────────────────────────────────────────────
    const Bar = ({ v, c, h = 5 }) => (
      <div style={{ background: "rgba(255,255,255,0.1)", borderRadius: 99, height: h, overflow: "hidden" }}>
        <div style={{ width: `${pct(v,c)}%`, height: "100%", background: col(pct(v,c)), borderRadius: 99, transition: "width .6s" }} />
      </div>
    );

    const KPI = ({ label, v, c, accent, sub }) => {
      const p = pct(v, c);
      return (
        <div style={{ background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.09)", borderRadius: 14, padding: "16px 18px", flex: 1, minWidth: 120 }}>
          <p style={{ margin: "0 0 5px", fontSize: 11, color: T.label, letterSpacing: ".08em", textTransform: "uppercase" }}>{label}</p>
          <p style={{ margin: "0 0 4px", fontSize: 24, fontWeight: 700, color: accent || col(p), letterSpacing: "-.02em" }}>{p}%</p>
          <p style={{ margin: "0 0 6px", fontSize: 13, color: T.muted }}>{fmt(v)} / {fmt(c)}</p>
          {sub && <p style={{ margin: 0, fontSize: 12, color: T.faint }}>{sub}</p>}
        </div>
      );
    };

    const Delta = ({ a, r, label }) => {
      const d = a - r;
      const p = Math.round((d / r) * 100);
      return (
        <span style={{ display: "flex", alignItems: "center", gap: 5 }}>
          <span style={{ fontSize: 12, color: T.faint }}>{label}</span>
          <span style={{ fontSize: 13, fontWeight: 600, color: d >= 0 ? "#4ade80" : "#f87171" }}>{d >= 0 ? "▲" : "▼"} {Math.abs(p)}%</span>
        </span>
      );
    };

    const Volver = ({ onClick }) => (
      <button onClick={onClick} style={{ background: "none", border: "none", color: T.muted, cursor: "pointer", fontSize: 13, padding: "0 0 20px", display: "flex", gap: 6 }}>← Volver</button>
    );

    const Item = ({ nombre, sub, hm3, capacidad, onClick }) => (
      <div style={rowStyle} onClick={onClick}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6 }}>
          <div style={{ flex: 1, minWidth: 0, paddingRight: 10 }}>
            <span style={{ fontSize: 14, fontWeight: 500 }}>{nombre}</span>
            {sub && <span style={{ fontSize: 12, color: T.muted, marginLeft: 6 }}>{sub}</span>}
          </div>
          <span style={{ fontSize: 15, fontWeight: 700, color: col(pct(hm3, capacidad)), flexShrink: 0 }}>{pct(hm3, capacidad)}%</span>
        </div>
        <Bar v={hm3} c={capacidad} />
      </div>
    );

    const ItemConMetricas = ({ item, onClick }) => (
      <div style={rowStyle} onClick={onClick}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
          <span style={{ fontSize: 15, fontWeight: 500 }}>{item.nombre}</span>
          <span style={{ fontSize: 16, fontWeight: 700, color: col(pct(item.hm3, item.capacidad)) }}>{pct(item.hm3, item.capacidad)}%</span>
        </div>
        <Bar v={item.hm3} c={item.capacidad} />
        <div style={{ display: "flex", gap: 14, marginTop: 8, flexWrap: "wrap" }}>
          <span style={{ fontSize: 12, color: T.muted }}>{fmt(item.hm3)}</span>
          <span style={{ fontSize: 12, color: T.faint }}>hace 1a: {pct(item.hace1year, item.capacidad)}%</span>
          <span style={{ fontSize: 12, color: T.faint }}>media 10a: {pct(item.media10, item.capacidad)}%</span>
        </div>
      </div>
    );

    // ── agrupaciones dinámicas ────────────────────────────────────────────────
    function agrupar(embalses, campo) {
      const mapa = {};
      for (const e of embalses) {
        const clave = e[campo] || "Desconocida";
        if (!mapa[clave]) mapa[clave] = { nombre: clave, hm3: 0, capacidad: 0, hace1year: 0, media10: 0, id: norm(clave) };
        mapa[clave].hm3       += e.hm3;
        mapa[clave].capacidad += e.capacidad;
        mapa[clave].hace1year += e.hace1year;
        mapa[clave].media10   += e.media10;
      }
      return Object.values(mapa).sort((a, b) => b.hm3 - a.hm3);
    }

    // ── vista detalle (cuenca / ccaa / provincia) ─────────────────────────────
    const Detalle = ({ tipo, item, embalses, onEmbalse, onVolver }) => {
      const campo = tipo === "cuenca" ? "cuenca" : tipo === "ccaa" ? "ccaa" : "provincia";
      const hijos = embalses
        .filter(e => e[campo] === item.nombre)
        .sort((a, b) => b.capacidad - a.capacidad);
      const p = pct(item.hm3, item.capacidad);
      const tipoLabel = { cuenca: "Cuenca", ccaa: "Comunidad autónoma", provincia: "Provincia" }[tipo];
      return (
        <div>
          <Volver onClick={onVolver} />
          <p style={{ margin: "0 0 4px", fontSize: 11, color: T.label, letterSpacing: ".1em", textTransform: "uppercase" }}>{tipoLabel}</p>
          <p style={{ margin: "0 0 16px", fontSize: 26, fontWeight: 700 }}>{item.nombre}</p>
          <p style={{ margin: "0 0 10px", fontSize: 52, fontWeight: 800, letterSpacing: "-.04em", color: col(p) }}>{p}%</p>
          <Bar v={item.hm3} c={item.capacidad} h={8} />
          <div style={{ display: "flex", gap: 10, marginTop: 18, flexWrap: "wrap" }}>
            <KPI label="Hoy" v={item.hm3} c={item.capacidad} />
            <KPI label="Hace 1 año" v={item.hace1year} c={item.capacidad} accent={T.muted} sub={`Δ ${item.hm3 > item.hace1year ? "+" : ""}${Math.round(item.hm3 - item.hace1year)} hm³`} />
            <KPI label="Media 10 años" v={item.media10} c={item.capacidad} accent={T.faint} sub={`Δ ${item.hm3 > item.media10 ? "+" : ""}${Math.round(item.hm3 - item.media10)} hm³`} />
          </div>
          <div style={{ display: "flex", gap: 16, marginTop: 12, flexWrap: "wrap" }}>
            <Delta a={item.hm3} r={item.hace1year} label="vs año anterior" />
            <Delta a={item.hm3} r={item.media10}   label="vs media 10 años" />
          </div>
          {hijos.length > 0 && (
            <>
              <p style={{ margin: "24px 0 10px", fontSize: 12, color: T.faint }}>Embalses ({hijos.length})</p>
              {hijos.map(e => (
                <Item key={e.nombre} nombre={e.nombre}
                  sub={tipo !== "provincia" ? e.provincia : e.cuenca}
                  hm3={e.hm3} capacidad={e.capacidad}
                  onClick={() => onEmbalse(e.nombre)} />
              ))}
            </>
          )}
        </div>
      );
    };

    // ── app principal ─────────────────────────────────────────────────────────
    function App() {
      const [datos,   setDatos]   = useState(null);
      const [error,   setError]   = useState(null);
      const [vista,   setVista]   = useState("nacional");
      const [sel,     setSel]     = useState(null);
      const [q,       setQ]       = useState("");

      useEffect(() => {
        fetch("datos.json")
          .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
          .then(setDatos)
          .catch(e => setError(e.message));
      }, []);

      const go = (v) => { setVista(v); setSel(null); setQ(""); };

      if (error) return (
        <div style={{ padding: 40, color: T.muted }}>
          <p style={{ fontSize: 18, marginBottom: 8 }}>No se pudieron cargar los datos</p>
          <p style={{ fontSize: 13, color: T.faint }}>{error}</p>
          <p style={{ fontSize: 13, color: T.faint, marginTop: 16 }}>
            Asegúrate de que el archivo <code>datos.json</code> existe en el repositorio.<br/>
            Puedes generarlo ejecutando <code>python procesar.py</code> o lanzando el workflow de GitHub Actions.
          </p>
        </div>
      );

      if (!datos) return (
        <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", color: T.faint, fontSize: 14 }}>
          Cargando datos…
        </div>
      );

      const { total, embalses, actualizado } = datos;

      // Agrupaciones calculadas dinámicamente
      const cuencas   = agrupar(embalses, "cuenca");
      const ccaas     = agrupar(embalses, "ccaa");
      const provincias = agrupar(embalses, "provincia");

      // Búsqueda
      const termino = norm(q.trim());
      const resultados = termino.length < 2 ? [] : embalses.filter(e =>
        norm(e.nombre).includes(termino) ||
        norm(e.provincia).includes(termino) ||
        norm(e.cuenca).includes(termino) ||
        norm(e.ccaa).includes(termino)
      );

      const navs = [
        { id: "nacional",   label: "España"    },
        { id: "cuencas",    label: "Cuencas"   },
        { id: "ccaa",       label: "CC.AA."    },
        { id: "provincias", label: "Provincias"},
        { id: "embalses",   label: "Embalses"  },
      ];

      // Items seleccionados
      const cuencaSel   = sel && cuencas.find(x => x.id === sel);
      const ccaaSel     = sel && ccaas.find(x => x.id === sel);
      const provinciaSel = sel && provincias.find(x => x.id === sel);
      const embalseSelObj = sel && embalses.find(e => norm(e.nombre) === sel);

      return (
        <div style={{ minHeight: "100vh", background: "#0a0a0f", color: "#fff" }}>

          {/* Header */}
          <div style={{ borderBottom: "1px solid rgba(255,255,255,0.07)", padding: "0 20px", position: "sticky", top: 0, background: "#0a0a0f", zIndex: 10 }}>
            <div style={{ maxWidth: 860, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between", height: 52 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <div style={{ width: 7, height: 7, borderRadius: "50%", background: "#3b82f6" }} />
                <span style={{ fontSize: 15, fontWeight: 600 }}>embalses<span style={{ color: T.faint }}>.es</span></span>
              </div>
              <nav style={{ display: "flex", gap: 2 }}>
                {navs.map(({ id, label }) => (
                  <button key={id} onClick={() => go(id)} style={{
                    background: vista === id ? "rgba(255,255,255,0.09)" : "none",
                    border: "none", color: vista === id ? "#fff" : T.muted,
                    fontSize: 13, cursor: "pointer", padding: "7px 12px", borderRadius: 99
                  }}>{label}</button>
                ))}
              </nav>
            </div>
          </div>

          <div style={{ maxWidth: 860, margin: "0 auto", padding: "28px 20px 60px" }}>

            {/* ── NACIONAL ── */}
            {vista === "nacional" && (() => {
              const p = pct(total.hm3, total.capacidad);
              return (
                <div>
                  <p style={{ margin: "0 0 4px", fontSize: 11, color: T.label, letterSpacing: ".1em", textTransform: "uppercase" }}>Reserva total · España</p>
                  <p style={{ margin: "0 0 8px", fontSize: 64, fontWeight: 800, letterSpacing: "-.05em", lineHeight: 1, color: col(p) }}>
                    {p}<span style={{ fontSize: 30, fontWeight: 400, color: T.faint }}>%</span>
                  </p>
                  <p style={{ margin: "0 0 14px", fontSize: 16, color: T.muted }}>{fmt(total.hm3)} de {fmt(total.capacidad)} de capacidad total</p>
                  <Bar v={total.hm3} c={total.capacidad} h={8} />
                  <div style={{ display: "flex", gap: 10, marginTop: 18, flexWrap: "wrap" }}>
                    <KPI label="Hoy" v={total.hm3} c={total.capacidad} sub={`Datos del ${actualizado}`} />
                    <KPI label="Hace 1 año" v={total.hace1year} c={total.capacidad} accent={T.muted} sub={`Δ ${total.hm3 > total.hace1year ? "+" : ""}${Math.round(total.hm3 - total.hace1year)} hm³`} />
                    <KPI label="Media 10 años" v={total.media10} c={total.capacidad} accent={T.faint} sub={`Δ ${total.hm3 > total.media10 ? "+" : ""}${Math.round(total.hm3 - total.media10)} hm³`} />
                  </div>
                  <div style={{ display: "flex", gap: 16, marginTop: 12, marginBottom: 28, flexWrap: "wrap" }}>
                    <Delta a={total.hm3} r={total.hace1year} label="vs año anterior" />
                    <Delta a={total.hm3} r={total.media10}   label="vs media 10 años" />
                  </div>
                  <p style={{ margin: "0 0 12px", fontSize: 11, color: T.label, letterSpacing: ".08em", textTransform: "uppercase" }}>Por cuenca</p>
                  {[...cuencas].sort((a,b) => pct(b.hm3,b.capacidad) - pct(a.hm3,a.capacidad)).map(c => (
                    <Item key={c.id} nombre={c.nombre} hm3={c.hm3} capacidad={c.capacidad}
                      onClick={() => { setVista("cuencas"); setSel(c.id); }} />
                  ))}
                </div>
              );
            })()}

            {/* ── CUENCAS ── */}
            {vista === "cuencas" && !sel && (
              <div>
                <p style={{ margin: "0 0 18px", fontSize: 22, fontWeight: 700, letterSpacing: "-.02em" }}>Cuencas hidrográficas</p>
                {cuencas.map(c => <ItemConMetricas key={c.id} item={c} onClick={() => setSel(c.id)} />)}
              </div>
            )}
            {vista === "cuencas" && sel && cuencaSel && (
              <Detalle tipo="cuenca" item={cuencaSel} embalses={embalses}
                onEmbalse={(n) => { setVista("embalses"); setSel(norm(n)); }}
                onVolver={() => setSel(null)} />
            )}

            {/* ── CC.AA. ── */}
            {vista === "ccaa" && !sel && (
              <div>
                <p style={{ margin: "0 0 18px", fontSize: 22, fontWeight: 700, letterSpacing: "-.02em" }}>Comunidades autónomas</p>
                {ccaas.map(c => <ItemConMetricas key={c.id} item={c} onClick={() => setSel(c.id)} />)}
              </div>
            )}
            {vista === "ccaa" && sel && ccaaSel && (
              <Detalle tipo="ccaa" item={ccaaSel} embalses={embalses}
                onEmbalse={(n) => { setVista("embalses"); setSel(norm(n)); }}
                onVolver={() => setSel(null)} />
            )}

            {/* ── PROVINCIAS ── */}
            {vista === "provincias" && !sel && (
              <div>
                <p style={{ margin: "0 0 18px", fontSize: 22, fontWeight: 700, letterSpacing: "-.02em" }}>Provincias</p>
                {provincias.map(p => <ItemConMetricas key={p.id} item={p} onClick={() => setSel(p.id)} />)}
              </div>
            )}
            {vista === "provincias" && sel && provinciaSel && (
              <Detalle tipo="provincia" item={provinciaSel} embalses={embalses}
                onEmbalse={(n) => { setVista("embalses"); setSel(norm(n)); }}
                onVolver={() => setSel(null)} />
            )}

            {/* ── EMBALSES ── */}
            {vista === "embalses" && !sel && (
              <div>
                <p style={{ margin: "0 0 14px", fontSize: 22, fontWeight: 700, letterSpacing: "-.02em" }}>Buscar embalse</p>
                <input value={q} onChange={e => setQ(e.target.value)}
                  placeholder="Nombre, provincia, cuenca o comunidad…"
                  style={{ width: "100%", background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.13)", borderRadius: 12, padding: "12px 16px", color: "#fff", fontSize: 15, marginBottom: 16 }}
                />
                {termino.length >= 2 && (
                  <p style={{ fontSize: 12, color: T.faint, marginBottom: 10 }}>
                    {resultados.length === 0 ? `Sin resultados para "${q}"` : `${resultados.length} resultado${resultados.length !== 1 ? "s" : ""}`}
                  </p>
                )}
                {(termino.length < 2 ? embalses : resultados).map(e => (
                  <Item key={e.nombre} nombre={e.nombre} sub={`${e.provincia} · ${e.cuenca}`}
                    hm3={e.hm3} capacidad={e.capacidad} onClick={() => setSel(norm(e.nombre))} />
                ))}
              </div>
            )}
            {vista === "embalses" && sel && embalseSelObj && (() => {
              const e = embalseSelObj;
              const p = pct(e.hm3, e.capacidad);
              return (
                <div>
                  <Volver onClick={() => setSel(null)} />
                  <p style={{ margin: "0 0 2px", fontSize: 11, color: T.label, letterSpacing: ".1em", textTransform: "uppercase" }}>Embalse</p>
                  <p style={{ margin: "0 0 5px", fontSize: 26, fontWeight: 700 }}>{e.nombre}</p>
                  <p style={{ margin: "0 0 16px", fontSize: 13, color: T.muted }}>{e.provincia} · {e.cuenca} · {e.ccaa}</p>
                  <p style={{ margin: "0 0 10px", fontSize: 52, fontWeight: 800, letterSpacing: "-.04em", color: col(p) }}>{p}%</p>
                  <Bar v={e.hm3} c={e.capacidad} h={8} />
                  <div style={{ display: "flex", gap: 10, marginTop: 18, flexWrap: "wrap" }}>
                    <KPI label="Hoy" v={e.hm3} c={e.capacidad} sub={`Datos del ${e.fecha}`} />
                    <KPI label="Hace 1 año" v={e.hace1year} c={e.capacidad} accent={T.muted} sub={`Δ ${e.hm3 > e.hace1year ? "+" : ""}${Math.round(e.hm3 - e.hace1year)} hm³`} />
                    <KPI label="Media 10 años" v={e.media10} c={e.capacidad} accent={T.faint} sub={`Δ ${e.hm3 > e.media10 ? "+" : ""}${Math.round(e.hm3 - e.media10)} hm³`} />
                  </div>
                  <div style={{ display: "flex", gap: 16, marginTop: 12, flexWrap: "wrap" }}>
                    <Delta a={e.hm3} r={e.hace1year} label="vs año anterior" />
                    <Delta a={e.hm3} r={e.media10}   label="vs media 10 años" />
                  </div>
                </div>
              );
            })()}

          </div>

          <div style={{ borderTop: "1px solid rgba(255,255,255,0.06)", padding: "16px 24px" }}>
            <p style={{ margin: 0, textAlign: "center", fontSize: 12, color: T.faint }}>
              Datos: <a href="https://www.miteco.gob.es" target="_blank" rel="noopener noreferrer" style={{ color: T.muted, textDecoration: "none" }}>Ministerio de Transición Ecológica</a> · Actualización semanal automática
            </p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
