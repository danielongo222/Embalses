<body>

  <script type="text/babel">
    const { useState, useRef } = React;

    const CUENCAS = [

      { id: "segura", nombre: "Segura", hm3: 792, capacidad: 1118, hace1year: 641, media10: 698 },

      { id: "galicia", nombre: "Galicia", hm3: 4310, capacidad: 5420, hace1year: 3840, media10: 4090 },
      { id: "murcia", nombre: "Murcia", hm3: 520, capacidad: 720, hace1year: 410, media10: 480 },
      { id: "pv", nombre: "País Vasco", hm3: 430, capacidad: 560, hace1year: 370, media10: 410 },
      { id: "navarra", nombre: "Navarra", hm3: 1280, capacidad: 1780, hace1year: 1140, media10: 1230 },
      { id: "rioja", nombre: "La Rioja", hm3: 310, capacidad: 420, hace1year: 270, media10: 290 },
      { id: "madrid", nombre: "Madrid", hm3: 830, capacidad: 1060, hace1year: 720, media10: 780 },
      { id: "valencia", nombre: "Comunitat Valenciana", hm3: 1340, capacidad: 2180, hace1year: 1080, media10: 1290 },

    const EMBALSES = [
      { id: 1, nombre: "La Serena", cuenca: "Guadiana", ccaa: "Extremadura", provincia: "Badajoz", hm3: 2920, capacidad: 3219, hace1year: 3041, media10: 2140 },
      { id: 2, nombre: "Alcántara (José M. Oriol)", cuenca: "Tajo", ccaa: "Extremadura", provincia: "Cáceres", hm3: 2424, capacidad: 3162, hace1year: 2680, media10: 2100 },
      { id: 3, nombre: "Almendra", cuenca: "Duero", ccaa: "Castilla y León", provincia: "Salamanca", hm3: 2648, capacidad: 2648, hace1year: 2200, media10: 2190 },
      { id: 4, nombre: "Buendía", cuenca: "Tajo", ccaa: "Castilla-La Mancha", provincia: "Cuenca", hm3: 1586, capacidad: 1638, hace1year: 1490, media10: 1280 },
      { id: 5, nombre: "Cijara", cuenca: "Guadiana", ccaa: "Extremadura", provincia: "Badajoz", hm3: 1422, capacidad: 1670, hace1year: 1280, media10: 1150 },
      { id: 6, nombre: "García de Sola (Puerto Peña)", cuenca: "Guadiana", ccaa: "Extremadura", provincia: "Badajoz", hm3: 894, capacidad: 1101, hace1year: 780, media10: 820 },
      { id: 7, nombre: "Torreón-El Castillo (Bornos)", cuenca: "Guadalete-Barbate", ccaa: "Andalucía", provincia: "Cádiz", hm3: 187, capacidad: 239, hace1year: 156, media10: 171 },
      { id: 8, nombre: "Contreras", cuenca: "Júcar", ccaa: "Castilla-La Mancha", provincia: "Cuenca", hm3: 784, capacidad: 852, hace1year: 640, media10: 710 },
      { id: 9, nombre: "Mequinenza", cuenca: "Ebro", ccaa: "Aragón", provincia: "Zaragoza", hm3: 1282, capacidad: 1534, hace1year: 1180, media10: 1230 },
      { id: 10, nombre: "Ribarroja", cuenca: "Ebro", ccaa: "Cataluña", provincia: "Tarragona", hm3: 202, capacidad: 207, hace1year: 190, media10: 198 },
      { id: 11, nombre: "El Atazar", cuenca: "Tajo", ccaa: "Madrid", provincia: "Madrid", hm3: 374, capacidad: 426, hace1year: 312, media10: 340 },
      { id: 12, nombre: "Porma (Juan Benet)", cuenca: "Duero", ccaa: "Castilla y León", provincia: "León", hm3: 315, capacidad: 317, hace1year: 280, media10: 270 },
      { id: 13, nombre: "Valdecañas", cuenca: "Tajo", ccaa: "Extremadura", provincia: "Cáceres", hm3: 1446, capacidad: 1446, hace1year: 1290, media10: 1180 },
      { id: 14, nombre: "Orellana", cuenca: "Guadiana", ccaa: "Extremadura", provincia: "Badajoz", hm3: 796, capacidad: 864, hace1year: 710, media10: 620 },
      { id: 15, nombre: "Canales (Sierra Nevada)", cuenca: "C. Mediterráneas Andaluzas", ccaa: "Andalucía", provincia: "Granada", hm3: 61, capacidad: 70, hace1year: 48, media10: 52 },
      { id: 16, nombre: "Iznájar", cuenca: "Guadalquivir", ccaa: "Andalucía", provincia: "Córdoba", hm3: 890, capacidad: 981, hace1year: 820, media10: 730 },
      { id: 17, nombre: "Tranco de Beas", cuenca: "Guadalquivir", ccaa: "Andalucía", provincia: "Jaén", hm3: 486, capacidad: 500, hace1year: 420, media10: 390 },
      { id: 18, nombre: "Entrepeñas", cuenca: "Tajo", ccaa: "Castilla-La Mancha", provincia: "Guadalajara", hm3: 803, capacidad: 835, hace1year: 740, media10: 680 },
      { id: 19, nombre: "Ricobayo", cuenca: "Duero", ccaa: "Castilla y León", provincia: "Zamora", hm3: 1122, capacidad: 1194, hace1year: 980, media10: 1040 },
      { id: 20, nombre: "Yesa", cuenca: "Ebro", ccaa: "Aragón", provincia: "Zaragoza", hm3: 442, capacidad: 447, hace1year: 390, media10: 360 },
      { id: 21, nombre: "Mediano", cuenca: "Ebro", ccaa: "Aragón", provincia: "Huesca", hm3: 371, capacidad: 436, hace1year: 320, media10: 340 },
      { id: 22, nombre: "Santillana", cuenca: "Tajo", ccaa: "Madrid", provincia: "Madrid", hm3: 85, capacidad: 91, hace1year: 74, media10: 79 },
      { id: 23, nombre: "Proserpina", cuenca: "Guadiana", ccaa: "Extremadura", provincia: "Badajoz", hm3: 5, capacidad: 7, hace1year: 4, media10: 5 },
      { id: 24, nombre: "Guadalmena", cuenca: "Guadalquivir", ccaa: "Andalucía", provincia: "Jaén", hm3: 910, capacidad: 910, hace1year: 790, media10: 720 },
      { id: 25, nombre: "Beninar", cuenca: "C. Mediterráneas Andaluzas", ccaa: "Andalucía", provincia: "Almería", hm3: 38, capacidad: 55, hace1year: 29, media10: 33 },
    ];

    const TOTAL_ESPANA = { hm3: 46608, capacidad: 56115, hace1year: 42100, media10: 39200 };

    const pct = (v, c) => Math.round((v / c) * 100);
    const fmtSolo = (v) => v >= 1000 ? `${(v / 1000).toFixed(2)} km³` : `${Math.round(v)} hm³`;

    const colorPct = (p) => {
      if (p >= 75) return "#4ade80";
      if (p >= 50) return "#facc15";
      if (p >= 30) return "#fb923c";
      return "#f87171";
    };

    const GaugeBar = ({ valor, capacidad, height = 6 }) => {
      const p = pct(valor, capacidad);
      return (
        <div style={{ background: "rgba(255,255,255,0.08)", borderRadius: 99, height, overflow: "hidden", width: "100%" }}>
          <div style={{ width: `${p}%`, height: "100%", background: colorPct(p), borderRadius: 99, transition: "width 0.6s cubic-bezier(.4,0,.2,1)" }} />
        </div>
      );
    };

    const KPICard = ({ label, valor, capacidad, sub, accent }) => {
      const p = pct(valor, capacidad);
      const col = accent || colorPct(p);
      return (
        <div style={{ background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 16, padding: "20px 24px", flex: 1, minWidth: 140 }}>
          <p style={{ margin: "0 0 8px", fontSize: 11, color: "rgba(255,255,255,0.45)", letterSpacing: "0.08em", textTransform: "uppercase" }}>{label}</p>
          <p style={{ margin: "0 0 4px", fontSize: 26, fontWeight: 700, color: col, letterSpacing: "-0.02em" }}>{p}%</p>
          <p style={{ margin: "0 0 10px", fontSize: 12, color: "rgba(255,255,255,0.5)" }}>{fmtSolo(valor)} / {fmtSolo(capacidad)}</p>
          {sub && <p style={{ margin: 0, fontSize: 11, color: "rgba(255,255,255,0.35)" }}>{sub}</p>}
        </div>
      );
    };

    const DeltaBadge = ({ actual, referencia, label }) => {
      const delta = actual - referencia;
      const pDelta = Math.round((delta / referencia) * 100);
      const pos = delta >= 0;
      return (
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ fontSize: 11, color: "rgba(255,255,255,0.35)" }}>{label}</span>
          <span style={{ fontSize: 12, fontWeight: 600, color: pos ? "#4ade80" : "#f87171" }}>
            {pos ? "▲" : "▼"} {Math.abs(pDelta)}%
          </span>
        </div>
      );
    };

    const BtnVolver = ({ onClick }) => (
      <button onClick={onClick} style={{ background: "none", border: "none", color: "rgba(255,255,255,0.4)", cursor: "pointer", fontSize: 13, padding: "0 0 24px", display: "flex", alignItems: "center", gap: 6 }}>← Volver</button>
    );

    function App() {
      const [vista, setVista] = useState("nacional");
      const [seleccion, setSeleccion] = useState(null);
      const [busqueda, setBusqueda] = useState("");
      const [query, setQuery] = useState("");
      const [iaRespuesta, setIaRespuesta] = useState("");
      const [iaCargando, setIaCargando] = useState(false);

      const navegar = (v) => { setVista(v); setSeleccion(null); setBusqueda(""); setIaRespuesta(""); };

      const embalsesFiltrados = EMBALSES.filter(e =>
        busqueda.length < 2 ? false :
          e.nombre.toLowerCase().includes(busqueda.toLowerCase()) ||
          e.provincia.toLowerCase().includes(busqueda.toLowerCase()) ||
          e.cuenca.toLowerCase().includes(busqueda.toLowerCase())
      );

      const consultarIA = async () => {
        if (!query.trim()) return;
        setIaCargando(true);
        setIaRespuesta("");
        const contexto = `Eres un experto en recursos hídricos de España. Tienes acceso a datos actuales de embalses:
TOTAL ESPAÑA: ${TOTAL_ESPANA.hm3} hm³ (${pct(TOTAL_ESPANA.hm3, TOTAL_ESPANA.capacidad)}% capacidad), hace 1 año: ${TOTAL_ESPANA.hace1year} hm³, media 10 años: ${TOTAL_ESPANA.media10} hm³.
CUENCAS: ${CUENCAS.map(c => `${c.nombre}: ${c.hm3} hm³ (${pct(c.hm3, c.capacidad)}%)`).join(", ")}
EMBALSES: ${EMBALSES.slice(0,15).map(e => `${e.nombre} (${e.provincia}): ${e.hm3}/${e.capacidad} hm³ (${pct(e.hm3,e.capacidad)}%)`).join(", ")}
Responde en español, de forma concisa. Máximo 3 párrafos.`;
        try {
          const resp = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 1000,
              system: contexto,
              messages: [{ role: "user", content: query }]
            })
          });
          const data = await resp.json();
          setIaRespuesta(data.content?.[0]?.text || "Sin respuesta.");
        } catch {
          setIaRespuesta("Error al conectar con el asistente.");
        }
        setIaCargando(false);
      };

      const navItems = [
        { id: "nacional", label: "España" },
        { id: "cuencas", label: "Cuencas" },
        { id: "ccaa", label: "CC.AA." },
        { id: "embalses", label: "Embalses" },
        { id: "asistente", label: "IA" },
      ];

      const rowStyle = {
        background: "rgba(255,255,255,0.03)",
        border: "1px solid rgba(255,255,255,0.06)",
        borderRadius: 12,
        padding: "14px 18px",
        cursor: "pointer",
        marginBottom: 8,
        transition: "background .15s",
      };

      return (
        <div style={{ minHeight: "100vh", background: "#0a0a0f", color: "#fff" }}>
          {/* Header */}
          <div style={{ borderBottom: "1px solid rgba(255,255,255,0.06)", padding: "0 20px", position: "sticky", top: 0, background: "#0a0a0f", zIndex: 10 }}>
            <div style={{ maxWidth: 860, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between", height: 52, flexWrap: "wrap", gap: 8 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <div style={{ width: 7, height: 7, borderRadius: "50%", background: "#3b82f6" }} />
                <span style={{ fontSize: 15, fontWeight: 600, letterSpacing: "-0.01em" }}>
                  embalses<span style={{ color: "rgba(255,255,255,0.3)" }}>.es</span>
                </span>
              </div>
              <nav style={{ display: "flex", gap: 2 }}>
                {navItems.map(({ id, label }) => (
                  <button key={id} onClick={() => navegar(id)} style={{
                    background: vista === id ? "rgba(255,255,255,0.09)" : "none",
                    border: "none", color: vista === id ? "#fff" : "rgba(255,255,255,0.4)",
                    fontSize: 13, cursor: "pointer", padding: "7px 14px", borderRadius: 99,
                  }}>{label}</button>
                ))}
              </nav>
            </div>
          </div>

          <div style={{ maxWidth: 860, margin: "0 auto", padding: "28px 20px 60px" }}>

            {/* ── NACIONAL ── */}
            {vista === "nacional" && (
              <div>
                <p style={{ margin: "0 0 4px", fontSize: 11, color: "rgba(255,255,255,0.3)", letterSpacing: "0.1em", textTransform: "uppercase" }}>Reserva total · España</p>
                <p style={{ margin: "0 0 10px", fontSize: 64, fontWeight: 800, letterSpacing: "-0.05em", lineHeight: 1, color: colorPct(pct(TOTAL_ESPANA.hm3, TOTAL_ESPANA.capacidad)) }}>
                  {pct(TOTAL_ESPANA.hm3, TOTAL_ESPANA.capacidad)}<span style={{ fontSize: 30, fontWeight: 400, color: "rgba(255,255,255,0.3)" }}>%</span>
                </p>
                <p style={{ margin: "0 0 14px", fontSize: 16, color: "rgba(255,255,255,0.45)", fontWeight: 300 }}>
                  {fmtSolo(TOTAL_ESPANA.hm3)} de {fmtSolo(TOTAL_ESPANA.capacidad)} de capacidad total
                </p>
                <GaugeBar valor={TOTAL_ESPANA.hm3} capacidad={TOTAL_ESPANA.capacidad} height={8} />
                <div style={{ display: "flex", gap: 10, marginTop: 24, marginBottom: 16, flexWrap: "wrap" }}>
                  <KPICard label="Hoy" valor={TOTAL_ESPANA.hm3} capacidad={TOTAL_ESPANA.capacidad} sub="Actualizado esta semana" />
                  <KPICard label="Hace 1 año" valor={TOTAL_ESPANA.hace1year} capacidad={TOTAL_ESPANA.capacidad} accent="rgba(255,255,255,0.5)" sub={`Δ ${TOTAL_ESPANA.hm3 > TOTAL_ESPANA.hace1year ? "+" : ""}${Math.round(TOTAL_ESPANA.hm3 - TOTAL_ESPANA.hace1year)} hm³`} />
                  <KPICard label="Media 10 años" valor={TOTAL_ESPANA.media10} capacidad={TOTAL_ESPANA.capacidad} accent="rgba(255,255,255,0.35)" sub={`Δ ${TOTAL_ESPANA.hm3 > TOTAL_ESPANA.media10 ? "+" : ""}${Math.round(TOTAL_ESPANA.hm3 - TOTAL_ESPANA.media10)} hm³`} />
                </div>
                <div style={{ display: "flex", gap: 16, marginBottom: 32, flexWrap: "wrap" }}>
                  <DeltaBadge actual={TOTAL_ESPANA.hm3} referencia={TOTAL_ESPANA.hace1year} label="vs año anterior" />
                  <DeltaBadge actual={TOTAL_ESPANA.hm3} referencia={TOTAL_ESPANA.media10} label="vs media 10 años" />
                </div>
                <p style={{ margin: "0 0 14px", fontSize: 11, color: "rgba(255,255,255,0.3)", letterSpacing: "0.08em", textTransform: "uppercase" }}>Estado por cuenca</p>
                {[...CUENCAS].sort((a, b) => pct(b.hm3, b.capacidad) - pct(a.hm3, a.capacidad)).map(c => {
                  const p = pct(c.hm3, c.capacidad);
                  return (
                    <div key={c.id} style={rowStyle} onClick={() => { setVista("cuencas"); setSeleccion(c.id); }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                        <span style={{ fontSize: 14, color: "rgba(255,255,255,0.85)" }}>{c.nombre}</span>
                        <span style={{ fontSize: 14, fontWeight: 600, color: colorPct(p) }}>{p}%</span>
                      </div>
                      <GaugeBar valor={c.hm3} capacidad={c.capacidad} height={4} />
                    </div>
                  );
                })}
              </div>
            )}

            {/* ── CUENCAS LISTA ── */}
            {vista === "cuencas" && !seleccion && (
              <div>
                <p style={{ margin: "0 0 20px", fontSize: 22, fontWeight: 700, letterSpacing: "-0.02em" }}>Cuencas hidrográficas</p>
                {[...CUENCAS].sort((a, b) => b.capacidad - a.capacidad).map(c => {
                  const p = pct(c.hm3, c.capacidad);
                  return (
                    <div key={c.id} style={rowStyle} onClick={() => setSeleccion(c.id)}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                        <span style={{ fontSize: 15, fontWeight: 500 }}>{c.nombre}</span>
                        <span style={{ fontSize: 18, fontWeight: 700, color: colorPct(p) }}>{p}%</span>
                      </div>
                      <GaugeBar valor={c.hm3} capacidad={c.capacidad} />
                      <div style={{ display: "flex", gap: 14, marginTop: 8, flexWrap: "wrap" }}>
                        <span style={{ fontSize: 12, color: "rgba(255,255,255,0.4)" }}>{fmtSolo(c.hm3)} actuales</span>
                        <span style={{ fontSize: 12, color: "rgba(255,255,255,0.3)" }}>hace 1a: {pct(c.hace1year, c.capacidad)}%</span>
                        <span style={{ fontSize: 12, color: "rgba(255,255,255,0.3)" }}>media 10a: {pct(c.media10, c.capacidad)}%</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {/* ── CUENCA DETALLE ── */}
            {vista === "cuencas" && seleccion && (() => {
              const c = CUENCAS.find(x => x.id === seleccion);
              if (!c) return null;
              const p = pct(c.hm3, c.capacidad);
              const embalsesC = EMBALSES.filter(e => e.cuenca === c.nombre);
              return (
                <div>
                  <BtnVolver onClick={() => setSeleccion(null)} />
                  <p style={{ margin: "0 0 4px", fontSize: 11, color: "rgba(255,255,255,0.3)", letterSpacing: "0.1em", textTransform: "uppercase" }}>Cuenca del {c.nombre}</p>
                  <p style={{ margin: "0 0 20px", fontSize: 52, fontWeight: 800, letterSpacing: "-0.04em", color: colorPct(p) }}>{p}%</p>
                  <GaugeBar valor={c.hm3} capacidad={c.capacidad} height={8} />
                  <div style={{ display: "flex", gap: 10, marginTop: 20, flexWrap: "wrap" }}>
                    <KPICard label="Hoy" valor={c.hm3} capacidad={c.capacidad} />
                    <KPICard label="Hace 1 año" valor={c.hace1year} capacidad={c.capacidad} accent="rgba(255,255,255,0.5)" sub={`Δ ${c.hm3 > c.hace1year ? "+" : ""}${Math.round(c.hm3 - c.hace1year)} hm³`} />
                    <KPICard label="Media 10 años" valor={c.media10} capacidad={c.capacidad} accent="rgba(255,255,255,0.35)" sub={`Δ ${c.hm3 > c.media10 ? "+" : ""}${Math.round(c.hm3 - c.media10)} hm³`} />
                  </div>
                  {embalsesC.length > 0 && <>
                    <p style={{ margin: "24px 0 10px", fontSize: 12, color: "rgba(255,255,255,0.3)" }}>Embalses en esta cuenca</p>
                    {embalsesC.map(e => {
                      const ep = pct(e.hm3, e.capacidad);
                      return (
                        <div key={e.id} style={rowStyle} onClick={() => { setVista("embalses"); setSeleccion(e.id); }}>
                          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                            <span style={{ fontSize: 14 }}>{e.nombre}</span>
                            <span style={{ fontSize: 14, fontWeight: 600, color: colorPct(ep) }}>{ep}%</span>
                          </div>
                          <GaugeBar valor={e.hm3} capacidad={e.capacidad} />
                        </div>
                      );
                    })}
                  </>}
                </div>
              );
            })()}

            {/* ── CCAA LISTA ── */}
            {vista === "ccaa" && !seleccion && (
              <div>
                <p style={{ margin: "0 0 20px", fontSize: 22, fontWeight: 700, letterSpacing: "-0.02em" }}>Comunidades autónomas</p>
                {[...CCAA].sort((a, b) => b.hm3 - a.hm3).map(c => {
                  const p = pct(c.hm3, c.capacidad);
                  return (
                    <div key={c.id} style={rowStyle} onClick={() => setSeleccion(c.id)}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                        <span style={{ fontSize: 15, fontWeight: 500 }}>{c.nombre}</span>
                        <span style={{ fontSize: 18, fontWeight: 700, color: colorPct(p) }}>{p}%</span>
                      </div>
                      <GaugeBar valor={c.hm3} capacidad={c.capacidad} />
                      <div style={{ display: "flex", gap: 14, marginTop: 8, flexWrap: "wrap" }}>
                        <span style={{ fontSize: 12, color: "rgba(255,255,255,0.4)" }}>{fmtSolo(c.hm3)}</span>
                        <span style={{ fontSize: 12, color: "rgba(255,255,255,0.3)" }}>hace 1a: {pct(c.hace1year, c.capacidad)}%</span>
                        <span style={{ fontSize: 12, color: "rgba(255,255,255,0.3)" }}>media 10a: {pct(c.media10, c.capacidad)}%</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {/* ── CCAA DETALLE ── */}
            {vista === "ccaa" && seleccion && (() => {
              const c = CCAA.find(x => x.id === seleccion);
              if (!c) return null;
              const p = pct(c.hm3, c.capacidad);
              const embalsesC = EMBALSES.filter(e => e.ccaa === c.nombre);
              return (
                <div>
                  <BtnVolver onClick={() => setSeleccion(null)} />
                  <p style={{ margin: "0 0 4px", fontSize: 11, color: "rgba(255,255,255,0.3)", letterSpacing: "0.1em", textTransform: "uppercase" }}>{c.nombre}</p>
                  <p style={{ margin: "0 0 20px", fontSize: 52, fontWeight: 800, letterSpacing: "-0.04em", color: colorPct(p) }}>{p}%</p>
                  <GaugeBar valor={c.hm3} capacidad={c.capacidad} height={8} />
                  <div style={{ display: "flex", gap: 10, marginTop: 20, flexWrap: "wrap" }}>
                    <KPICard label="Hoy" valor={c.hm3} capacidad={c.capacidad} />
                    <KPICard label="Hace 1 año" valor={c.hace1year} capacidad={c.capacidad} accent="rgba(255,255,255,0.5)" sub={`Δ ${c.hm3 > c.hace1year ? "+" : ""}${Math.round(c.hm3 - c.hace1year)} hm³`} />
                    <KPICard label="Media 10 años" valor={c.media10} capacidad={c.capacidad} accent="rgba(255,255,255,0.35)" sub={`Δ ${c.hm3 > c.media10 ? "+" : ""}${Math.round(c.hm3 - c.media10)} hm³`} />
                  </div>
                  {embalsesC.length > 0 && <>
                    <p style={{ margin: "24px 0 10px", fontSize: 12, color: "rgba(255,255,255,0.3)" }}>Embalses en {c.nombre}</p>
                    {embalsesC.map(e => {
                      const ep = pct(e.hm3, e.capacidad);
                      return (
                        <div key={e.id} style={rowStyle} onClick={() => { setVista("embalses"); setSeleccion(e.id); }}>
                          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                            <span style={{ fontSize: 14 }}>{e.nombre} <span style={{ color: "rgba(255,255,255,0.3)", fontSize: 12 }}>· {e.provincia}</span></span>
                            <span style={{ fontSize: 14, fontWeight: 600, color: colorPct(ep) }}>{ep}%</span>
                          </div>
                          <GaugeBar valor={e.hm3} capacidad={e.capacidad} />
                        </div>
                      );
                    })}
                  </>}
                </div>
              );
            })()}

            {/* ── EMBALSES LISTA + BÚSQUEDA ── */}
            {vista === "embalses" && !seleccion && (
              <div>
                <p style={{ margin: "0 0 16px", fontSize: 22, fontWeight: 700, letterSpacing: "-0.02em" }}>Buscar embalse</p>
                <input
                  value={busqueda}
                  onChange={e => setBusqueda(e.target.value)}
                  placeholder="Nombre, provincia o cuenca…"
                  style={{ width: "100%", background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 12, padding: "12px 16px", color: "#fff", fontSize: 15, marginBottom: 20 }}
                />
                {busqueda.length >= 2 && embalsesFiltrados.length === 0 && (
                  <p style={{ color: "rgba(255,255,255,0.4)", fontSize: 14 }}>Sin resultados para "{busqueda}"</p>
                )}
                {(busqueda.length < 2 ? [...EMBALSES].sort((a,b) => b.capacidad - a.capacidad) : embalsesFiltrados).map(e => {
                  const p = pct(e.hm3, e.capacidad);
                  return (
                    <div key={e.id} style={rowStyle} onClick={() => setSeleccion(e.id)}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                        <div>
                          <span style={{ fontSize: 14, fontWeight: 500 }}>{e.nombre}</span>
                          <span style={{ fontSize: 12, color: "rgba(255,255,255,0.3)", marginLeft: 8 }}>{e.provincia} · {e.cuenca}</span>
                        </div>
                        <span style={{ fontSize: 15, fontWeight: 700, color: colorPct(p) }}>{p}%</span>
                      </div>
                      <GaugeBar valor={e.hm3} capacidad={e.capacidad} />
                    </div>
                  );
                })}
              </div>
            )}

            {/* ── EMBALSE DETALLE ── */}
            {vista === "embalses" && seleccion && (() => {
              const e = EMBALSES.find(x => x.id === seleccion);
              if (!e) return null;
              const p = pct(e.hm3, e.capacidad);
              return (
                <div>
                  <BtnVolver onClick={() => setSeleccion(null)} />
                  <p style={{ margin: "0 0 2px", fontSize: 11, color: "rgba(255,255,255,0.3)", letterSpacing: "0.1em", textTransform: "uppercase" }}>Embalse</p>
                  <p style={{ margin: "0 0 4px", fontSize: 28, fontWeight: 700, letterSpacing: "-0.02em" }}>{e.nombre}</p>
                  <p style={{ margin: "0 0 20px", fontSize: 13, color: "rgba(255,255,255,0.35)" }}>{e.provincia} · {e.cuenca} · {e.ccaa}</p>
                  <p style={{ margin: "0 0 8px", fontSize: 52, fontWeight: 800, letterSpacing: "-0.04em", color: colorPct(p) }}>{p}%</p>
                  <GaugeBar valor={e.hm3} capacidad={e.capacidad} height={8} />
                  <div style={{ display: "flex", gap: 10, marginTop: 20, flexWrap: "wrap" }}>
                    <KPICard label="Hoy" valor={e.hm3} capacidad={e.capacidad} />
                    <KPICard label="Hace 1 año" valor={e.hace1year} capacidad={e.capacidad} accent="rgba(255,255,255,0.5)" sub={`Δ ${e.hm3 > e.hace1year ? "+" : ""}${Math.round(e.hm3 - e.hace1year)} hm³`} />
                    <KPICard label="Media 10 años" valor={e.media10} capacidad={e.capacidad} accent="rgba(255,255,255,0.35)" sub={`Δ ${e.hm3 > e.media10 ? "+" : ""}${Math.round(e.hm3 - e.media10)} hm³`} />
                  </div>
                  <div style={{ marginTop: 20, padding: "16px 20px", background: "rgba(255,255,255,0.03)", borderRadius: 12, border: "1px solid rgba(255,255,255,0.06)" }}>
                    <p style={{ margin: "0 0 10px", fontSize: 11, color: "rgba(255,255,255,0.3)", textTransform: "uppercase", letterSpacing: "0.08em" }}>Comparativa</p>
                    <div style={{ display: "flex", gap: 20, flexWrap: "wrap" }}>
                      <DeltaBadge actual={e.hm3} referencia={e.hace1year} label="vs año anterior" />
                      <DeltaBadge actual={e.hm3} referencia={e.media10} label="vs media 10 años" />
                    </div>
                  </div>
                </div>
              );
            })()}

            {/* ── ASISTENTE IA ── */}
            {vista === "asistente" && (
              <div>
                <p style={{ margin: "0 0 8px", fontSize: 22, fontWeight: 700, letterSpacing: "-0.02em" }}>Asistente de embalses</p>
                <p style={{ margin: "0 0 24px", fontSize: 14, color: "rgba(255,255,255,0.4)" }}>Pregúntame sobre cualquier embalse, cuenca o situación hídrica de España.</p>
                <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 16 }}>
                  {[
                    "¿Cuál es la situación del Guadalquivir?",
                    "¿Qué cuenca tiene menor reserva ahora mismo?",
                    "¿Estamos mejor o peor que el año pasado?",
                    "¿Cómo está Extremadura respecto a la media?",
                  ].map(s => (
                    <button key={s} onClick={() => setQuery(s)} style={{ textAlign: "left", background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.07)", borderRadius: 10, padding: "10px 16px", color: "rgba(255,255,255,0.6)", fontSize: 13, cursor: "pointer" }}>{s}</button>
                  ))}
                </div>
                <div style={{ display: "flex", gap: 10, marginBottom: 20 }}>
                  <input
                    value={query}
                    onChange={e => setQuery(e.target.value)}
                    onKeyDown={e => e.key === "Enter" && consultarIA()}
                    placeholder="Escribe tu pregunta…"
                    style={{ flex: 1, background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 12, padding: "12px 16px", color: "#fff", fontSize: 14 }}
                  />
                  <button onClick={consultarIA} disabled={iaCargando || !query.trim()} style={{ background: "rgba(255,255,255,0.1)", border: "1px solid rgba(255,255,255,0.15)", color: "#fff", borderRadius: 10, padding: "10px 20px", cursor: iaCargando ? "not-allowed" : "pointer", fontSize: 13, opacity: iaCargando || !query.trim() ? 0.4 : 1 }}>
                    {iaCargando ? "…" : "Preguntar"}
                  </button>
                </div>
                {iaCargando && <p style={{ color: "rgba(255,255,255,0.4)", fontSize: 14 }}>Consultando…</p>}
                {iaRespuesta && (
                  <div style={{ background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 16, padding: "20px 24px" }}>
                    <p style={{ margin: "0 0 8px", fontSize: 11, color: "rgba(255,255,255,0.25)", letterSpacing: "0.1em", textTransform: "uppercase" }}>Respuesta</p>
                    <p style={{ margin: 0, fontSize: 14, color: "rgba(255,255,255,0.8)", lineHeight: 1.7, whiteSpace: "pre-wrap" }}>{iaRespuesta}</p>
                  </div>
                )}
              </div>
            )}
          </div>

          {/* Footer */}
          <div style={{ borderTop: "1px solid rgba(255,255,255,0.05)", padding: "16px 24px" }}>
            <p style={{ margin: 0, textAlign: "center", fontSize: 12, color: "rgba(255,255,255,0.2)" }}>
              Datos: <a href="https://www.embalses.net" target="_blank" rel="noopener noreferrer" style={{ color: "rgba(255,255,255,0.35)", textDecoration: "none" }}>embalses.net</a> · Ministerio de Transición Ecológica · Actualización semanal
            </p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
